name: Bug report
description: Report a reproducible problem with the wizard or generated wiki setup
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve MediaWiki Autosetup. Search existing issues first and remove passwords, tokens, and private URLs from anything you share.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the project is causing trouble?
      options:
        - Interactive terminal wizard
        - Generated Docker Compose project
        - Automatic MediaWiki installation
        - Logo or extension configuration
        - CAPTCHA provider configuration
        - Documentation or CI
        - Something else
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and the smallest set of steps that reproduces it.
      placeholder: |
        1. Run bun start
        2. Choose ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Autosetup version or commit
      description: Run `bun run src/index.ts --version` or paste the Git commit SHA.
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your OS, architecture, Bun version, Docker versions, and selected CAPTCHA provider or relevant version when applicable. Never include CAPTCHA secrets or admin keys.
      placeholder: |
        OS: Fedora 42 x86_64
        Bun: 1.3.11
        Docker: 28.x
        Docker Compose: 2.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the smallest useful excerpt. Remove credentials and private information first.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Safety checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed passwords, tokens, and other private information.
          required: true
