name: Feature request
description: Suggest an improvement to the setup experience or generated project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Explain the user problem first so the best solution stays open for discussion.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Interactive terminal wizard
        - MediaWiki configuration
        - Extensions and themes
        - Docker and deployment
        - Documentation and contributor experience
        - Something else
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Who would benefit, and what is difficult today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or workflow you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or different approaches you considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, or links that help explain the request. Do not include secrets.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for similar requests.
          required: true
        - label: This request is about MediaWiki Autosetup rather than MediaWiki core support.
          required: true
